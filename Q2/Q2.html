<!DOCTYPE html>
<head>
<style>

{% comment %} path.link {
  fill: none;
  stroke: #666;
  stroke-width: 1.5px;
} {% endcomment %}

path.link {
  fill: none;
}

circle {
  fill: #ccc;
  stroke: #fff;
  stroke: black;
  stroke-width: 1.5px;
}

text {
  fill: #000;
  font: 10px sans-serif;
  pointer-events: none;
}

</style>
<meta charset="utf-8">
<title></title>
</head>

<body>
<script type="text/javascript" src="../lib/d3.v5.min.js"></script>
<script>

d3.dsv(",", "board_games.csv", function(d) {
  return {
    source: d.source,
    target: d.target,
    value: +d.value
  }
}).then(function(data) {

  var links = data;

  var nodes = {};

  // compute the distinct nodes from the links.
  links.forEach(function(link) {
      link.source = nodes[link.source] || (nodes[link.source] = {name: link.source});
      link.target = nodes[link.target] || (nodes[link.target] = {name: link.target});
  });

  var width = 1200,
      height = 700;




// Calculate degree for each node
    links.forEach(function(link) {
        link.source.degree = (link.source.degree || 0) + 1;
        link.target.degree = (link.target.degree || 0) + 1;
    });

    
    var degreeValues = d3.values(nodes).map(function(d) { return d.degree || 0; });
    var radiusScale = d3.scaleSqrt()
        .domain([d3.min(degreeValues), d3.max(degreeValues)])
        .range([4, 20]);  
   
    var colorScale = d3.scaleLinear()
        .domain([d3.min(degreeValues), d3.max(degreeValues)])
        .range(["#c6dbef", "#08306b"]); 
  //DO NOT MODIFY THE BELOW BLOCK OF CODE//
  var force = d3.forceSimulation()
      .nodes(d3.values(nodes))
      .force("link", d3.forceLink(links).distance(100))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force("x", d3.forceX())
      .force("y", d3.forceY())
      .force("charge", d3.forceManyBody().strength(-250))
      .alphaTarget(1)
      .on("tick", tick);
  //DO NOT MODIFY THE ABOVE BLOCK OF CODE//

  var svg = d3.select("body").append("svg")
      .attr("width", width)
      .attr("height", height);

  svg.append("text")
    .attr("id", "credit")
    .attr("x", width - 10)
    .attr("y", 20)
    .attr("text-anchor", "end")
    .style("font-size", "12px")
    .text("anoor46");

  // add the links
  var path = svg.append("g")
    .selectAll("path")
    .data(links)
    .enter()
    .append("path")
    .attr("class", function(d) { return "link " + d.type; })
    .style("stroke", function(d) {
        return d.value === 0 ? "#999999" : "green";
    })
    .style("stroke-width", function(d) {
        return d.value === 0 ? "3px" : "1px";
    })
    .style("stroke-dasharray", function(d) {
        return d.value === 0 ? "none" : "5,5";
    });


  // define the nodes
  var node = svg.selectAll(".node")
      .data(force.nodes())
      .enter().append("g")
      .attr("class", "node")
      .call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended))
        .on("dblclick", unpinNode);
        

  
  node.append("circle")
    .attr("id", function(d) {
        return (d.name.replace(/\s+/g, '').toLowerCase());
    })
    .attr("r", function(d) {
        return radiusScale(d.degree || 0);
    })
    .style("fill", function(d) {
        return colorScale(d.degree || 0);
    });

  node.append("text")
      .attr("dx", 8)
      .attr("dy", -8)
      .style("font-weight", "bold")
      .text(function(d) { return d.name; });

  // add the curvy lines
  function tick() {
      path.attr("d", function(d) {
          var dx = d.target.x - d.source.x,
              dy = d.target.y - d.source.y,
              dr = Math.sqrt(dx * dx + dy * dy);
          return "M" +
              d.source.x + "," +
              d.source.y + "A" +
              dr + "," + dr + " 0 0,1 " +
              d.target.x + "," +
              d.target.y;
      });

      node.attr("transform", function(d) {
          return "translate(" + d.x + "," + d.y + ")"; 
      });
  };

  function dragstarted(d) {
      if (!d3.event.active) force.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
  };

  function dragged(d) {
      d.fx = d3.event.x;
      d.fy = d3.event.y;
  };

  function dragended(d) {
    if (!d3.event.active) force.alphaTarget(0);
    
    d.fx = d.x;
    d.fy = d.y;
    d.fixed = true;
    
    d3.select(this).select("circle")
        .style("fill", "yellow");
};


function unpinNode(d) {
    if (d.fixed === true) {
        d.fixed = false;
        d.fx = null;  
        d.fy = null;
        
        d3.select(this).select("circle")
            .style("fill", function() {
                return colorScale(d.degree || 0);
            });
        
        force.alphaTarget(0.3).restart();
    }
};
  
}).catch(function(error) {
  console.log(error);
});

</script>
</body>
</html>
